<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: blob: https: *; connect-src 'self' https: wss:; font-src 'self' https: data:;" />
  <title>AgroVerse — Премиум Агромаркетплейс</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-regular-rounded/css/uicons-regular-rounded.css" />
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-solid-rounded/css/uicons-solid-rounded.css" />
  <link rel="stylesheet" href="https://cdn-uicons.flaticon.com/2.6.0/uicons-brands/css/uicons-brands.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Decorative background elements -->
  <div class="decoration-dots" id="decoration"></div>
  <canvas id="hero-canvas" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;border-radius:var(--radius-lg);opacity:0;transition:opacity 1s;"></canvas>
  <div id="app">
    <div id="page-loader" class="page-loader">
      <div class="loader-leaf" style="animation: float 2s ease-in-out infinite;">🌿</div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="js/i18n.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/premium-effects.js"></script>
  <script src="js/pages/login.js"></script>
  <script src="js/pages/register.js"></script>
  <script src="js/pages/home.js"></script>
  <script src="js/pages/catalog.js"></script>
  <script src="js/pages/product.js"></script>
  <script src="js/pages/product-new.js"></script>
  <script src="js/pages/profile.js"></script>
  <script src="js/pages/ai.js"></script>
  <script src="js/pages/cart.js"></script>
  <script src="js/pages/orders.js"></script>
  <script src="js/pages/wallet.js"></script>
  <script src="js/pages/tariffs.js"></script>
  <script src="js/pages/admin.js"></script>
  <script src="js/router.js"></script>

  <script>
    // Generate decorative dots
    const decoration = document.getElementById('decoration');
    for (let i = 0; i < 30; i++) {
      const dot = document.createElement('div');
      dot.className = 'dot';
      dot.style.left = Math.random() * 100 + '%';
      dot.style.top = Math.random() * 100 + '%';
      dot.style.animationDelay = Math.random() * 4 + 's';
      decoration.appendChild(dot);
    }

    // Add smooth page transitions
    document.addEventListener('DOMContentLoaded', () => {
      const loader = document.getElementById('page-loader');
      if (loader) loader.style.display = 'none';
    });
  </script>
  <script>
    (function(){
      const canvas = document.getElementById('hero-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      let W, H, particles = [], animId;
    
      function resize() {
        const hero = document.querySelector('.hero');
        if (!hero) return;
        const r = hero.getBoundingClientRect();
        canvas.width = W = r.width;
        canvas.height = H = r.height;
        canvas.style.position = 'absolute';
        hero.style.position = 'relative';
        hero.prepend(canvas);
      }
    
      function rand(a, b) { return a + Math.random() * (b - a); }
    
      class Particle {
        constructor() { this.reset(); }
        reset() {
          this.x = rand(0, W);
          this.y = rand(0, H);
          this.r = rand(1, 3.5);
          this.vx = rand(-0.3, 0.3);
          this.vy = rand(-0.5, -0.1);
          this.alpha = rand(0.2, 0.7);
          this.color = Math.random() > 0.5 ? '74,222,128' : '16,185,129';
        }
        update() {
          this.x += this.vx;
          this.y += this.vy;
          this.alpha -= 0.001;
          if (this.y < -10 || this.alpha <= 0) this.reset();
        }
        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(${this.color},${this.alpha})`;
          ctx.shadowColor = `rgba(${this.color},0.6)`;
          ctx.shadowBlur = 6;
          ctx.fill();
        }
      }
    
      function init() {
        resize();
        particles = Array.from({length: 80}, () => new Particle());
        canvas.style.opacity = '1';
        loop();
      }
    
      function loop() {
        ctx.clearRect(0, 0, W, H);
    
        // Градиентный фон
        const grd = ctx.createLinearGradient(0, 0, W, H);
        grd.addColorStop(0, 'rgba(2,20,8,1)');
        grd.addColorStop(0.5, 'rgba(4,30,12,1)');
        grd.addColorStop(1, 'rgba(0,10,4,1)');
        ctx.fillStyle = grd;
        ctx.fillRect(0, 0, W, H);
    
        // Свечение снизу
        const glow = ctx.createRadialGradient(W*0.5, H, 0, W*0.5, H, W*0.6);
        glow.addColorStop(0, 'rgba(16,185,129,0.12)');
        glow.addColorStop(1, 'transparent');
        ctx.fillStyle = glow;
        ctx.fillRect(0, 0, W, H);
    
        ctx.shadowBlur = 0;
        particles.forEach(p => { p.update(); p.draw(); });
        animId = requestAnimationFrame(loop);
      }
    
      window.addEventListener('resize', () => { cancelAnimationFrame(animId); resize(); loop(); });
      window.addEventListener('load', () => setTimeout(init, 300));
    })();
    </script>
</body>
</html>
