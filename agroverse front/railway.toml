[[headers]]
for = "/*"

[headers.values]
Content-Security-Policy = "default-src 'self' https: data: blob:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: blob: https: *; connect-src 'self' https: wss: *; font-src 'self' https: data:; frame-src 'self' https:; object-src 'none';"
